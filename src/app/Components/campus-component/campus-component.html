<div class="dashboard-container">
  <div class="content-wrapper">
    
    <div class="job-card-container fade-in">
      <header class="form-header">
        <div class="header-icon">💼</div>
        <div class="header-text">
          <h2>Post Opportunity</h2>
          <p>Notify students about new openings.</p>
        </div>
      </header>

      <form (ngSubmit)="addJob()" class="modern-form">
        
        <div class="form-section">
          <h3 class="section-divider"><span>Basic Information</span></h3>
          <div class="grid-layout">
            <div class="field">
              <label>Company Name <span class="required">*</span></label>
              <input type="text" [(ngModel)]="job.company" name="company" placeholder="e.g. Google" required>
            </div>
            <div class="field">
              <label>Job Title <span class="required">*</span></label>
              <input type="text" [(ngModel)]="job.title" name="title" placeholder="e.g. Software Engineer" required>
            </div>
            <div class="field">
              <label>Job Type</label>
              <div class="select-wrapper">
                <select [(ngModel)]="job.jobType" name="jobType">
                  <option value="">Select Type</option>
                  <option>Full Time</option>
                  <option>Internship</option>
                  <option>Contract</option>
                </select>
              </div>
            </div>
            <div class="field">
              <label>Industry</label>
              <input type="text" [(ngModel)]="job.industry" name="industry" placeholder="e.g. IT / Finance">
            </div>
          </div>
        </div>

        <div class="form-section">
          <h3 class="section-divider"><span>Package & Rules</span></h3>
          <div class="grid-layout">
            <div class="field">
              <label>Salary Package</label>
              <input type="text" [(ngModel)]="job.salaryPackage" name="salaryPackage" placeholder="e.g. 6 LPA">
            </div>
            <div class="field">
              <label>Eligible Semester</label>
              <div class="select-wrapper">
                <select [(ngModel)]="job.semester" name="semester">
                  <option value="">Select Sem</option>
                  <option>5</option><option>6</option><option>7</option><option>8</option>
                </select>
              </div>
            </div>
            <div class="field">
              <label>Registration Last Date</label>
              <input type="date" [(ngModel)]="job.registrationLastDate" name="registrationLastDate" class="date-input">
            </div>
            <div class="field">
              <label>Attachment (JD PDF)</label>
              <div class="file-upload-wrapper">
                <input type="file" id="file-input" accept="application/pdf" (change)="onFileSelected($event)">
                <label for="file-input" class="file-label">
                  <span class="file-icon">📁</span>
                  <span class="file-text">{{ selectedFileName || 'Tap to upload PDF' }}</span>
                </label>
              </div>
            </div>
          </div>
        </div>

        <div class="form-section">
          <h3 class="section-divider"><span>Descriptions</span></h3>
          <div class="field full-width">
            <label>Eligibility Criteria</label>
            <textarea [(ngModel)]="job.eligibility" name="eligibility" rows="3" placeholder="CGPA, Branch..."></textarea>
          </div>
          <div class="field full-width">
            <label>Job Description</label>
            <textarea [(ngModel)]="job.jobDescription" name="jobDescription" rows="4" placeholder="Roles..."></textarea>
          </div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn-cancel">Discard</button>
          <button type="submit" class="submit-btn">🚀 Post Now</button>
        </div>

      </form>
    </div>

  </div>
</div>
