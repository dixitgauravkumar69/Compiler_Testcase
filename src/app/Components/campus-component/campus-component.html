<div class="container">
  <h2 class="form-title">Add Placement Opportunity</h2>

  <form (ngSubmit)="addJob()" class="job-form">

    <div class="grid">

      <div class="field">
        <label>Company Name</label>
        <input type="text" [(ngModel)]="job.company" name="company" required>
      </div>

      <div class="field">
        <label>Job Title</label>
        <input type="text" [(ngModel)]="job.title" name="title" required>
      </div>

      <div class="field">
        <label>Job Type</label>
        <select [(ngModel)]="job.jobType" name="jobType">
          <option value="">Select</option>
          <option>Full Time</option>
          <option>Internship</option>
          <option>Contract</option>
        </select>
      </div>

      <div class="field">
        <label>Industry</label>
        <input type="text" [(ngModel)]="job.industry" name="industry">
      </div>

      <div class="field">
        <label>Location</label>
        <input type="text" [(ngModel)]="job.location" name="location">
      </div>

      <div class="field">
        <label>Eligible Semester</label>
        <select [(ngModel)]="job.semester" name="semester">
          <option value="">Select</option>
          <option>5</option>
          <option>6</option>
          <option>7</option>
          <option>8</option>
        </select>
      </div>

      <div class="field">
        <label>Salary Package</label>
        <input type="text" [(ngModel)]="job.salaryPackage" name="salaryPackage" placeholder="e.g. 6 LPA">
      </div>

      <div class="field">
        <label>Bond</label>
        <input type="text" [(ngModel)]="job.bond" name="bond" placeholder="e.g. 2 years">
      </div>

      <div class="field">
        <label>Registration Last Date</label>
        <input type="date" [(ngModel)]="job.registrationLastDate" name="registrationLastDate">
      </div>

    </div>

    <div class="field full">
      <label>Eligibility</label>
      <textarea [(ngModel)]="job.eligibility" name="eligibility" placeholder="Minimum CGPA, Branch etc"></textarea>
    </div>

    <div class="field full">
      <label>Skills Required</label>
      <textarea [(ngModel)]="job.skillsRequired" name="skillsRequired" placeholder="Java, Spring Boot, Angular etc"></textarea>
    </div>

    <div class="field full">
      <label>Job Description (JD)</label>
      <textarea [(ngModel)]="job.jobDescription" name="jobDescription"></textarea>
    </div>

    <div class="field full">
      <label>Selection Process</label>
      <textarea [(ngModel)]="job.selectionProcess" name="selectionProcess" placeholder="Aptitude → Technical → HR"></textarea>
    </div>

    <div class="field full">
      <label>Attachment (PDF)</label>
      <input type="file" accept="application/pdf" (change)="onFileSelected($event)">
    </div>

    <button type="submit" class="submit-btn">Post Job</button>

  </form>
</div>
