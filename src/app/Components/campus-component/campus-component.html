<div class="custom-toast" [class.show]="showToast">
  <div class="toast-content">
    <span class="icon">🔔</span>
    <p>{{ toastMessage }}</p>
  </div>
  <div class="progress-bar"></div>
</div>

<form (ngSubmit)="addJob()" class="modern-form horizontal-form">

  <div class="form-columns">

    <!-- LEFT SIDE -->
    <div class="form-col">

      <!-- BASIC -->
      <div class="form-section">
        <h3>Basic Info</h3>

        <div class="grid-layout">
          <div class="field">
            <label>Company *</label>
            <input type="text" [(ngModel)]="job.company" name="company">
          </div>

          <div class="field">
            <label>Job Title *</label>
            <input type="text" [(ngModel)]="job.title" name="title">
          </div>

          <div class="field">
            <label>Job Type</label>
            <select [(ngModel)]="job.jobType" name="jobType">
              <option value="">Select</option>
              <option>Full Time</option>
              <option>Internship</option>
            </select>
          </div>

          <div class="field">
            <label>Location</label>
            <input type="text" [(ngModel)]="job.location" name="location">
          </div>
        </div>
      </div>

      <!-- ELIGIBILITY -->
      <div class="form-section">
        <h3>Eligibility</h3>

        <div class="grid-layout">
          <div class="field">
            <label>Branch *</label>
            <input type="text" [(ngModel)]="job.eligibleBranch" name="eligibleBranch">
          </div>

          <div class="field">
            <label>CGPA *</label>
            <input type="number" [(ngModel)]="job.cgpa" name="cgpa">
          </div>
        </div>
      </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="form-col">

      <!-- PACKAGE -->
      <div class="form-section">
        <h3>Package & Rules</h3>

        <div class="grid-layout">
          <div class="field">
            <label>Salary</label>
            <input type="text" [(ngModel)]="job.salaryPackage" name="salaryPackage">
          </div>

          <div class="field">
            <label>Semester</label>
            <select [(ngModel)]="job.semester" name="semester">
              <option value="">Select</option>
              <option>5</option><option>6</option>
              <option>7</option><option>8</option>
            </select>
          </div>

          <div class="field">
            <label>Bond</label>
            <input type="text" [(ngModel)]="job.bond" name="bond">
          </div>

          <div class="field">
            <label>Last Date</label>
            <input type="date" [(ngModel)]="job.registrationLastDate" name="registrationLastDate">
          </div>
        </div>
      </div>

      <!-- DETAILS -->
      <div class="form-section">
        <h3>Details</h3>

        <div class="field full-width">
          <label>Skills</label>
          <textarea [(ngModel)]="job.skillsRequired" name="skillsRequired"></textarea>
        </div>

        <div class="field full-width">
          <label>Selection Process</label>
          <textarea [(ngModel)]="job.selectionProcess" name="selectionProcess"></textarea>
        </div>

        <div class="field full-width">
          <label>Description</label>
          <textarea [(ngModel)]="job.jobDescription" name="jobDescription"></textarea>
        </div>

        <div class="field full-width">
          <label>Attachment</label>
          <input type="file" (change)="onFileSelected($event)">
        </div>

      </div>

    </div>

  </div>

  <!-- ACTIONS -->
  <div class="form-actions">
    <button type="button" class="btn-cancel">Cancel</button>
    <button type="submit" class="submit-btn">🚀 Post Job</button>
  </div>

</form>
