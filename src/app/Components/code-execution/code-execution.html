<div class="code-runner-container">
  <h2>Online Code Runner</h2>

  <div class="form-group">
    <label for="language">Language:</label>
    <select [(ngModel)]="language" id="language" class="language-select">
      <option *ngFor="let lang of languages" [value]="lang">{{lang}}</option>
    </select>
  </div>

  <div class="form-group">
    <label for="code">Code:</label>
    <textarea [(ngModel)]="code" id="code" class="code-editor" placeholder="Write your code here..."></textarea>
  </div>

  <button (click)="runCode()" class="run-btn">Run Code</button>

  <h3>Output:</h3>
  <pre class="code-output">{{output}}</pre>
</div>
