<div class="toast" *ngIf="toastMessage" [ngClass]="toastType">
  {{ toastMessage }}
</div>
<div class="dashboard-container">
  <div class="content-wrapper">
    
    <div class="resume-builder-card fade-in">
      <header class="builder-header">
        <div class="header-icon">📄</div>
        <div class="header-text">
          <h2>Resume Builder</h2>
          <p>Create a professional resume in seconds.</p>
        </div>
      </header>



      <form class="resume-form-modern">
        
        <div class="form-section">
          <h3 class="section-title"><span>Personal & Education</span></h3>
          <div class="form-grid-responsive">
            <div class="field">
              <label>Full Name</label>
              <input type="text" [(ngModel)]="profile.username" name="name" placeholder="John Doe">
            </div>
            <div class="field">
              <label>Email Address</label>
              <input type="email" [(ngModel)]="profile.email" name="email" placeholder="john@example.com">
            </div>
            <div class="field">
              <label>Phone Number</label>
              <input type="text" [(ngModel)]="profile.phone" name="phone" placeholder="+91 98765...">
            </div>
            <div class="field">
              <label>College / University</label>
              <input type="text" [(ngModel)]="profile.college" name="college" placeholder="IIT Delhi">
            </div>
            <div class="field">
              <label>Branch</label>
              <input type="text" [(ngModel)]="profile.branch" name="branch" placeholder="Computer Science">
            </div>
            <div class="field">
              <label>Current CGPA</label>
              <input type="text" [(ngModel)]="profile.cgpa" name="cgpa" placeholder="e.g. 8.5">
            </div>
          </div>
        </div>

        <div class="form-section">
          <h3 class="section-title"><span>Professional Links</span></h3>
          <div class="form-grid-responsive">
            <div class="field">
              <label>GitHub Profile</label>
              <input type="text" [(ngModel)]="profile.github" name="github" placeholder="github.com/username">
            </div>
            <div class="field">
              <label>LinkedIn Profile</label>
              <input type="text" [(ngModel)]="profile.linkedin" name="linkedin" placeholder="linkedin.com/in/user">
            </div>
            <div class="field full-width-mobile">
              <label>Core Skills</label>
              <input type="text" [(ngModel)]="profile.skills" name="skills" placeholder="Java, Angular, Spring...">
            </div>
          </div>
        </div>

        <div class="form-section">
          <h3 class="section-title"><span>Experience & Bio</span></h3>
          <div class="form-grid-full">
            <div class="field">
              <label>Key Projects</label>
              <textarea [(ngModel)]="extra.projects" name="projects" rows="3" placeholder="Describe projects..."></textarea>
            </div>
            <div class="field">
              <label>Professional Summary</label>
              <textarea [(ngModel)]="extra.summary" name="summary" rows="3" placeholder="Career goals..."></textarea>
            </div>
          </div>
        </div>

        <div class="action-footer">
          <button type="button" class="btn-secondary" (click)="getResume()">GetAll Resume</button>
          <button type="button" class="btn-primary" (click)="addResume()">✨ Generate Resume</button>
        </div>
      </form>
    </div>

    <div class="resume-list-container fade-in" *ngIf="resumes.length > 0">
      <h2 class="list-title">My Resumes</h2>
      <div class="resume-grid">
        <div class="resume-premium-card" *ngFor="let r of resumes; let i=index">
          <div class="card-mobile-flex">
            <div class="resume-icon">📄</div>
            <div class="resume-info">
              <h3>Resume {{i+1}}</h3>
              <p>{{r.bio | slice:0:50}}...</p>
            </div>
          </div>
          <button class="btn-download" (click)="downloadResume(r.id)">
            <span>⬇️</span> Download PDF
          </button>
        </div>
      </div>
    </div>

  </div>
</div>
