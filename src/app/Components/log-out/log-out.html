<div class="logout-wrapper white-theme">
  <div class="bg-pattern"></div>

  <div class="logout-card shadow-premium fade-in">
    <div class="status-box">
      <div class="spinner-container" *ngIf="!done">
        <div class="double-bounce-spinner"></div>
      </div>

      <div class="success-anim" *ngIf="done">
        <div class="icon-circle">
          <svg class="checkmark-svg" viewBox="0 0 52 52">
            <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none"/>
            <path class="checkmark-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
          </svg>
        </div>
      </div>
    </div>

    <div class="content-box">
      <h2 class="status-title" [class.success-text]="done">
        {{ done ? 'Securely Logged Out' : 'Logging Out...' }}
      </h2>
      <p class="status-subtitle">
        {{ done ? 'Redirecting you to the login portal safely.' : 'We are ending your session and clearing workspace data.' }}
      </p>
    </div>

    <div class="progress-container" *ngIf="done">
      <div class="progress-bar-fill"></div>
    </div>

    <div class="logout-footer">

      
  <div class="avatar-xs">
        <img src="favicon.ico" alt="Logo" style="width: 100%; height: 100%; object-fit: cover" />
      </div>
      <span>Dev Campus Security</span>
    </div>
  </div>
</div>
