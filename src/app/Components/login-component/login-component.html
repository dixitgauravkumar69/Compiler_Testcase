<div class="toast-wrapper" *ngIf="toastMessage" [ngClass]="toastType">
  <div class="toast-content">
    <div class="icon">
      <i *ngIf="toastType === 'success'" class="ph-bold ph-check-circle"></i>
      <i *ngIf="toastType === 'error'"   class="ph-bold ph-x-circle"></i>
      <i *ngIf="toastType === 'info'"    class="ph-bold ph-info"></i>
    </div>
    <p>{{ toastMessage }}</p>
  </div>
  <div class="toast-progress"></div>
</div>

<div class="main">
  <div class="auth-container">
    
    <div class="info-side">
      <div class="info-content">
        <h1>Welcome Back!</h1>
        <p>Log in to continue your coding journey and access your personalized dashboard.</p>
        <div class="illustration-box">
          <div class="code-badge"><span>&lt;/&gt;</span> Keep Coding</div>
        </div>
      </div>
    </div>

    <div class="form-side">
      <div class="form-wrapper">
        <div class="header">
          <h2>User Login</h2>
          <p>Don't have an account? <a (click)="goToSignup()" class="link">Create one here</a></p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="loginUser()">
          <div class="input-box">
            <label>Email Address</label>
            <input 
              type="email" 
              placeholder="example@gmail.com" 
              formControlName="userEmail" 
              required
            >
          </div>

          <div class="input-box password-box">
            <label>Password</label>
            <input
              [type]="showPassword ? 'text' : 'password'"
              placeholder="Password"
              formControlName="password"
              required
            >
            <button type="button" class="eye-btn" (click)="showPassword = !showPassword" [title]="showPassword ? 'Hide password' : 'Show password'">
              <i class="ph-bold" [class.ph-eye]="!showPassword" [class.ph-eye-slash]="showPassword"></i>
            </button>
          </div>

          <button type="submit" class="login-btn" [disabled]="isLoading || !loginForm.valid">
            <span *ngIf="!isLoading">Login</span>
            <span *ngIf="isLoading" class="btn-loader"></span>
          </button>
        </form>

        <p class="status-msg error" *ngIf="errorMessage">{{errorMessage}}</p>
      </div>
    </div>

  </div>
</div>
