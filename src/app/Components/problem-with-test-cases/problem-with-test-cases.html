<div class="dashboard-container">

  <!-- ===== MOBILE HEADER ===== -->
  <header class="mobile-header">
    <div class="header-left">
      <button class="menu-trigger" (click)="toggleSidebar()">
        <span class="burger-icon"></span>
      </button>
      <h3>Dev Campus</h3>
    </div>
    <div class="mobile-header-right">
      <app-theme-switcher></app-theme-switcher>
      <div class="avatar-xs">T</div>
    </div>
  </header>

  <!-- ===== OVERLAY ===== -->
  <div class="sidebar-overlay" [class.show]="isSidebarOpen" (click)="closeSidebar()"></div>

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" [class.active]="isSidebarOpen" routerLink="/teacher">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="logo-box">D</div>
        <span>Dev Campus</span>
      </div>
      <p class="sidebar-subtitle">Teacher Dashboard</p>
    </div>

    <nav class="nav-links">
    
      <button [class.active]="activeSection === 'see'" (click)="handleProblemsClick()">
        <i class="ph-bold ph-list-checks"></i> Problems List
      </button>
      <button [class.active]="activeSection === 'add'" (click)="handleAddStatement()">
        <i class="ph-bold ph-plus-circle"></i> Add Statement
      </button>
      <button [class.active]="activeSection === 'campus'" (click)="handleCampus()">
        <i class="ph-bold ph-buildings"></i> Campus Info
      </button>
      <a [routerLink]="['/changePassword']" [queryParams]="{from:'teacher'}" class="nav-item" routerLinkActive="active" (click)="closeSidebar()">
        <i class="ph-bold ph-lock-key"></i> Change Password
      </a>
    </nav>

    <div class="sidebar-footer">
      <app-theme-switcher></app-theme-switcher>
      <button class="logout-btn" (click)="logout()">
        <i class="ph-bold ph-sign-out"></i> Logout
      </button>
    </div>
  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main-content">

    <!-- TOAST -->
    <div *ngIf="toastMessage" class="toast-wrapper fade-in" [ngClass]="toastType">
      <div class="toast-content">
        <div class="icon">
          <i *ngIf="toastType === 'success'" class="ph-bold ph-check-circle"></i>
          <i *ngIf="toastType === 'error'"   class="ph-bold ph-x-circle"></i>
          <i *ngIf="toastType === 'warning'" class="ph-bold ph-warning"></i>
          <i *ngIf="toastType === 'info'"    class="ph-bold ph-info"></i>
        </div>
        <p>{{ toastMessage }}</p>
      </div>
      <div class="toast-progress"></div>
    </div>

    <!-- LOADER -->
    <div *ngIf="isLoading" class="loader-overlay">
      <div class="spinner"></div>
    </div>

    <!-- ===== PROBLEM LIST ===== -->
    <div *ngIf="activeSection === 'see'">
      <!-- Problems List UI -->
    </div>

    <!-- ===== ADD PROBLEM ===== -->
    <div *ngIf="activeSection === 'add'" class="coding-ui-container fade-in">

      <header class="ui-header">
        <div class="header-main">
          <h2>Add New Problem</h2>
          <p>Configure problem statement and test scenarios.</p>
        </div>

        <div class="stepper">
          <div class="step" [class.active]="!problemSaved" [class.completed]="problemSaved">
            <span class="step-num">1</span>
            <span class="step-text">Problem</span>
          </div>
          <div class="step-line"></div>
          <div class="step" [class.active]="problemSaved">
            <span class="step-num">2</span>
            <span class="step-text">Test Cases</span>
          </div>
        </div>
      </header>

      <!-- STEP 1 -->
      <main class="step-content" *ngIf="!problemSaved">
        <div class="form-group">
          <label>Problem Title</label>
          <input type="text" [(ngModel)]="problemTitle" class="form-control-modern" placeholder="e.g. Two Sum">
        </div>

        <div class="form-group">
          <label>Difficulty Level</label>
          <select [(ngModel)]="level" class="form-control-modern">
            <option value="" disabled selected>Select Level</option>
            <option value="EASY">Easy</option>
            <option value="MEDIUM">Medium</option>
            <option value="HARD">Hard</option>
          </select>
        </div>

        <div class="form-group">
          <label>Problem Statement</label>
          <textarea [(ngModel)]="problemStatement" rows="8" class="form-control-modern" placeholder="Describe the problem..."></textarea>
        </div>

        <div class="action-bar">
          <button (click)="saveProblem()" class="btn-primary-modern">
            Save & Continue <i class="ph-bold ph-arrow-right"></i>
          </button>
        </div>
      </main>

      <!-- STEP 2 -->
      <main class="step-content" *ngIf="problemSaved">
        <div class="problem-info-banner">
          <span>Problem ID: <strong>#{{ problemId }}</strong></span>
          <button class="btn-text" (click)="problemSaved = false">
            <i class="ph-bold ph-pencil-simple"></i> Edit
          </button>
        </div>

        <div class="testcase-grid">
          <!-- FORM -->
          <div class="testcase-form">
            <div class="form-group">
              <label>Input Data</label>
              <textarea [(ngModel)]="inputData" rows="4" class="form-control-code" placeholder="e.g. 1 2 3 4"></textarea>
            </div>
            <div class="form-group">
              <label>Expected Output</label>
              <textarea [(ngModel)]="expectedOutput" rows="3" class="form-control-code" placeholder="e.g. 10"></textarea>
            </div>
            <button (click)="addTestCase()" class="btn-secondary-modern">
              <i class="ph-bold ph-plus"></i> Add Test Case
            </button>
          </div>

          <!-- PREVIEW -->
          <div class="testcase-preview">
            <label>Added Test Cases ({{ testCasesAdded.length }})</label>
            <div class="testcase-list-wrapper">
              <ul class="testcase-list">
                <li *ngFor="let tc of testCasesAdded; let i = index">
                  <span class="tc-badge">TC #{{ i + 1 }}</span>
                  <span class="tc-text">{{ tc | slice:0:50 }}...</span>
                </li>
                <div *ngIf="testCasesAdded.length === 0" class="empty-tc">
                  <i class="ph-bold ph-clipboard-text"></i>
                  <p>No test cases added yet.</p>
                </div>
              </ul>
            </div>
            <button class="btn-finish" *ngIf="testCasesAdded.length > 0" (click)="AddProblem()">
              <i class="ph-bold ph-check-circle"></i> Add Problem
            </button>
          </div>
        </div>
      </main>

    </div>

    <!-- ===== CAMPUS ===== -->
    <div *ngIf="activeSection === 'campus'">
      <!-- Campus UI -->
    </div>

  </main>
</div>
