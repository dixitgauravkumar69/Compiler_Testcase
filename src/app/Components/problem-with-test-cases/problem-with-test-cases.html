<div class="coding-ui-container fade-in">
  <header class="ui-header">

    <div class="top-bar">
    <button class="btn-back" (click)="goBack()">
      <span class="icon">←</span>
      <span class="text">Back</span>
    </button>
  </div>
  
    <div class="header-main">
      <h2>Add New Problem</h2>
      <p>Configure problem statement and test scenarios.</p>
    </div>

    <div class="stepper">
      <div class="step" [class.active]="!problemSaved" [class.completed]="problemSaved">
        <span class="step-num">1</span>
        <span class="step-text">Problem</span>
      </div>
      <div class="step-line"></div>
      <div class="step" [class.active]="problemSaved">
        <span class="step-num">2</span>
        <span class="step-text">Test Cases</span>
      </div>
    </div>
  </header>

  <main class="step-content" *ngIf="!problemSaved">
    <div class="form-group">
      <label>Problem Title</label>
      <input type="text" [(ngModel)]="problemTitle" class="form-control-modern" placeholder="e.g. Two Sum">
    </div>

    <div class="form-group">
  <label>Difficulty Level</label>
  <select [(ngModel)]="level" class="form-control-modern">
    <option value="" disabled selected>Select Level</option>
    <option value="EASY">Easy</option>
    <option value="MEDIUM">Medium</option>
    <option value="HARD">Hard</option>
  </select>
</div>

    <div class="form-group">
      <label>Problem Statement</label>
      <textarea [(ngModel)]="problemStatement" rows="8" class="form-control-modern" placeholder="Describe the problem, constraints, and examples..."></textarea>
    </div>

   

    <div class="action-bar">
      <button (click)="saveProblem()" class="btn-primary-modern">
        <span>Save & Continue</span> →
      </button>
    </div>
  </main>

  <main class="step-content" *ngIf="problemSaved">
    <div class="problem-info-banner">
      <span>Problem ID: <strong>#{{ problemId }}</strong></span>
      <button class="btn-text" (click)="problemSaved = false">✏️ Edit Problem</button>
    </div>

    <div class="testcase-grid">
      <div class="testcase-form">
        <div class="form-group">
          <label>Input Data</label>
          <textarea [(ngModel)]="inputData" rows="3" class="form-control-code" placeholder="e.g. [2, 7, 11, 15], 9"></textarea>
        </div>

        <div class="form-group">
          <label>Expected Output</label>
          <textarea [(ngModel)]="expectedOutput" rows="2" class="form-control-code" placeholder="e.g. [0, 1]"></textarea>
        </div>

        <button (click)="addTestCase()" class="btn-secondary-modern">
          ➕ Add Test Case
        </button>
      </div>

      <div class="testcase-preview">
        <label>Added Test Cases ({{ testCasesAdded.length }})</label>
        <div class="testcase-list-wrapper">
          <ul class="testcase-list">
            <li *ngFor="let tc of testCasesAdded; let i = index" class="fade-in">
              <span class="tc-badge">TC #{{ i + 1 }}</span>
              <span class="tc-summary">{{ tc | slice:0:40 }}...</span>
            </li>
            <div *ngIf="testCasesAdded.length === 0" class="empty-state">
              No test cases added yet.
            </div>
          </ul>
        </div>
        
        <button class="btn-finish mt-3" *ngIf="testCasesAdded.length > 0" (click)="AddProblem()">
          ✅ Add Problem
        </button>
      </div>
    </div>
  </main>

  <p class="status-message" *ngIf="message">{{ message }}</p>
</div>
