<div class="dashboard">

  <!-- Sidebar -->
  <div class="sidebar">

    <h2 class="logo">Student Panel</h2>

    <ul class="menu">
      <li><a routerLink="/profile">👤 See Profile</a></li>
      <li><a routerLink="/generateResume">📄 Generate Resume</a></li>
      <li><a routerLink="/findJobInfo">💼 Find job Information</a></li>
      <li><a routerLink="/student">💻 Solve Problems</a></li>
      <li><a routerLink="/logout">🚪 Logout</a></li>
    </ul>

  </div>


  <!-- Main Content -->
  <div class="main-content">

    <h2>Assigned Problem Statements</h2>

    
    <div *ngIf="loading">
      Loading questions...
    </div>

    <div *ngFor="let q of questions" class="card">

      <h3>Question #{{q.id}}</h3>

      <p>{{q.problemStatement}}</p>

      <button (click)="solve(q.id)">Solve</button>

    </div>

  </div>

</div>
