<div class="dashboard">

  <!-- 📱 Mobile Header -->
  <div class="mobile-header">
    <span class="menu-btn" (click)="toggleSidebar()">☰</span>
    <h3>Student Panel</h3>
  </div>

  <!-- Sidebar -->
  <div class="sidebar" [class.active]="isSidebarOpen">

    <h2 class="logo">Student Panel</h2>

    <ul class="menu">
      <li><a routerLink="/profile" (click)="closeSidebar()">👤 See Profile</a></li>
      <li><a routerLink="/generateResume" (click)="closeSidebar()">📄 Generate Resume</a></li>
      <li><a routerLink="/findJobInfo" (click)="closeSidebar()">💼 Find Job</a></li>
      <li><a routerLink="/student" (click)="closeSidebar()">💻 Solve Problems</a></li>
      <li><a routerLink="/logout">🚪 Logout</a></li>
    </ul>

  </div>


  <!-- Main Content -->
  <div class="main-content">

   <div class="main-content">

  <h2>Assigned Problem Statements</h2>

  <div *ngIf="loading" class="loader">
    Loading questions...
  </div>

  <div *ngFor="let q of questions" class="card">
    <h3>Question #{{q.id}}</h3>
    <p>{{q.problemStatement}}</p>
    <button class="solve-btn" (click)="solve(q.id)">Solve</button>
  </div>

  <div class="pagination-container" *ngIf="totalPages > 1">
    <button 
      class="pag-btn" 
      [disabled]="currentPage === 0" 
      (click)="getQuestions(currentPage - 1)">
      &laquo; Previous
    </button>

    <span class="page-info">Page {{ currentPage + 1 }} of {{ totalPages }}</span>

    <button 
      class="pag-btn" 
      [disabled]="currentPage >= totalPages - 1" 
      (click)="getQuestions(currentPage + 1)">
      Next &raquo;
    </button>
  </div>

</div>

</div>
