<div class="dashboard-container">
  <main class="main-content">
    <div *ngIf="isLoading" class="loader-box">
      <div class="spinner"></div>
    </div>

    <div class="content-wrapper" *ngIf="!isLoading">
      <section *ngIf="activeSection === 'see'" class="fade-in">
        <div class="section-title">
          <h2>Problem Repository</h2>
          <p>Assign and track coding challenges.</p>
        </div>

        <div class="problem-grid">
          <div class="modern-card" *ngFor="let ps of problemStatements">
            <div class="card-header">
              <span class="id-tag">#{{ ps.id }}</span>
              <span class="status-badge" [ngClass]="ps.statusClass">
                {{ ps.statusText }}
              </span>
            </div>

            <div class="card-body">
              <h3>Problem Statement</h3>
              <p class="truncate-text">{{ ps.problemStatement }}</p>

              <div class="time-details" *ngIf="ps.assigned && ps.startTime"
                style="margin-top: 12px; padding: 10px; background: rgba(0, 255, 255, 0.05); border-radius: 8px; border: 1px dashed #00ffff;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                  <span style="color: #888; font-size: 0.75rem;">IST Window:</span>
                  <span style="color: #00ffff; font-weight: bold; font-size: 0.85rem;">
                    {{ ps.displayTimeRange }}
                  </span>
                </div>
                <div style="text-align: right; margin-top: 4px;">
                  <small style="color: #555; font-size: 0.65rem;">
                    {{ toLocalTime(ps.startTime) | date: 'dd MMM' }}
                  </small>
                </div>
              </div>
            </div>

            <div class="card-footer-actions">
              <button class="btn-assign" [class.is-assigned]="ps.assigned" (click)="assign(ps.id)">
                {{ ps.assigned ? '✅ Assigned' : 'Assign' }}
              </button>
              <button class="btn-view" (click)="fetchSolvedStudents(ps.id)">Results</button>
              <button class="btn-live" (click)="liveStream(ps.id)">
                <span class="icon">📡</span> Live Stream
              </button>
            </div>
          </div>
        </div>
      </section>

      </div>
  </main>

  <app-live-component *ngIf="showLiveModal" [problemId]="selectedProblemId" 
    (onClose)="showLiveModal = false" (onConfirm)="receiveDataFromChild($event)">
  </app-live-component>
</div>
