<div class="dashboard">

  <!-- Sidebar -->
  <div class="sidebar">

    <h2>Teacher Panel</h2>

    <button (click)="activeSection='see'">
      See Problem Statements
    </button>

    <button (click)="goToAddStatement()">
      Add Problem Statement
    </button>

    <button (click)="goToAddCampus()">
      Add information of Campus
    </button>

  </div>

  <!-- Content -->
  <div class="content">

    <!-- Spinner -->
    <div *ngIf="isLoading" class="spinner-container">
      <div class="spinner"></div>
    </div>

    <!-- Actual content -->
    <div *ngIf="!isLoading">
      <h2>Problem Statements</h2>

      <div class="problem-card" *ngFor="let ps of problemStatements">
        <h3>Problem {{ps.id}}</h3>
        <p>{{ps.problemStatement}}</p>
        <button (click)="assign(ps.id)">
          {{ ps.assigned ? 'Assigned' : 'Assign' }}
        </button>
      </div>
    </div>

  </div>

</div>
