<div class="main">
  <div class="auth-container fade-in">
    
    <div class="info-side">
      <div class="info-content">
        <h1>Welcome!</h1>
        <p>Join our community of developers.</p>
        <div class="feature-list">
          <div class="feature-item"><span>✓</span> Multi-language Compiler</div>
          <div class="feature-item"><span>✓</span> Real-time Performance</div>
        </div>
      </div>
    </div>

    <div class="form-side">
      <div class="form-wrapper">
        <div class="header">
          <h2>Create Account</h2>
          <p>Have an account? <a (click)="goToLogin()" class="link">Login</a></p>
        </div>

        <form [formGroup]="userForm" (ngSubmit)="registerUser()">
          <div class="input-box">
            <input type="text" placeholder="Full Name" formControlName="userName">
          </div>

          <div class="input-box">
            <input type="email" placeholder="Email Address" formControlName="userEmail">
          </div>

          <div class="input-box">
            <select formControlName="userRole">
              <option value="" disabled selected>Select Your Role</option>
              <option value="ADMIN">Admin</option>
              <option value="STUDENT">Student</option>
              <option value="TEACHER">Teacher</option>
            </select>
          </div>

          <div class="input-box">
            <input type="password" placeholder="Password" formControlName="password">
          </div>

          <button type="submit" class="register-btn" [disabled]="!userForm.valid">
            Get Started
          </button>
        </form>

        <p class="status-msg" [ngClass]="{'success': isSuccess, 'error': !isSuccess}" *ngIf="message">
          {{message}}
        </p>
      </div>
    </div>

  </div>
</div>
